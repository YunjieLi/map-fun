<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8' />
    <title>重温笑傲江湖</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.1.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7.2.0/turf.min.js"></script>
    <style>

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        h1 { }
        p { margin-bottom: 5px; }

        #layout {
            position: absolute;
            inset: 0;
            display: flex;
        }

        #map {
            flex: 1;
            min-width: 0;
            position: relative;
        }

        #event-panel {
            flex-shrink: 0;
            width: 20rem;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #ddd;
            background: #fff;
        }

        #event-panel__toolbar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            padding: 0.875rem 1rem 0.75rem;
            border-bottom: 1px solid #eee;
        }

        #event-panel__header {
            margin: 0;
            font: 700 0.75rem/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #666;
        }

        #event-panel__controls {
            display: flex;
            gap: 0.375rem;
        }

        #event-panel__controls button {
            padding: 0.3125rem 0.625rem;
            border: 1px solid #ddd;
            border-radius: 0.25rem;
            background: #fff;
            font: 600 0.6875rem/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #555;
            cursor: pointer;
        }

        #event-panel__controls button:hover:not(:disabled) {
            background: #f7f7f7;
            border-color: #ccc;
        }

        #event-panel__controls button:disabled {
            opacity: 0.45;
            cursor: default;
        }

        #event-list {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
        }

        #event-list::-webkit-scrollbar {
            display: block;
            width: 8px;
        }

        #event-list::-webkit-scrollbar-thumb {
            background: rgb(0 0 0 / 18%);
            border-radius: 9999px;
        }

        .event-item {
            padding: 0.875rem 1rem;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .event-chapter:not(:last-child) {
            border-bottom: 1px solid #ddd;
        }

        .event-chapter__header {
            position: sticky;
            top: 0;
            z-index: 1;
            padding: 0.625rem 1rem;
            font: 700 0.8125rem/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #444;
            background: #f3f3f3;
            border-bottom: 1px solid #e5e5e5;
        }

        .event-chapter .event-item:last-child {
            border-bottom: none;
        }

        .event-item:hover {
            background: #f7f7f7;
        }

        .event-item.is-active {
            background: #fdf0f0;
        }

        .event-item__name {
            font: 700 0.875rem/1.3 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #c45;
            margin-bottom: 0.25rem;
        }

        .event-item__event {
            font: 0.8125rem/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #333;
            margin-bottom: 0.375rem;
        }

        .event-item__meta {
            font: 0.75rem/1.3 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #666;
        }

        .event-item__people {
            display: flex;
            align-items: center;
            margin-top: 0.5rem;
        }

        .event-item__avatar {
            width: 2rem;
            height: 2rem;
            border-radius: 9999px;
            object-fit: cover;
            flex-shrink: 0;
            background: #f0f0f0;
            border: 2px solid #fff;
            box-shadow: 0 1px 3px rgb(0 0 0 / 12%);
        }

        .event-item__avatar + .event-item__avatar {
            margin-left: -0.5rem;
        }

        .event-character-marker {
            width: 3rem;
            height: 3rem;
            border-radius: 9999px;
            background: #fff;
            border: 3px solid #fff;
            box-shadow: 0 2px 12px rgb(0 0 0 / 28%);
            overflow: hidden;
            pointer-events: none;
        }

        .event-character-marker__avatar {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #sidebar {
            width: 320px; overflow: auto;
            background-color: white; border-color: #abbcbe;
        }
        ::-webkit-scrollbar { display: none; }

        .slide {
            width:100%; min-height: 60px; overflow:overlay;
            transition: opacity .2s ease-in-out;
            -moz-transition: opacity .2s ease-in-out;
            -webkit-transition: opacity .2s ease-in-out;
        }
        .slide img { width:48px; margin-left: -14px; position:relative;}
        .slide img:first-of-type { margin-left: 0px; z-index: 1; }
        .slide img.lg { width:60px; }
        .slide strong { color: black; }


        .slide.active, .slide:hover { background-color: #e9f1f1; color:salmon; opacity:1;}

        .event { max-width: 200px; line-height: 16px; z-index: 1};

        .event-tooltip.mapboxgl-popup {
            z-index: 2;
        }

        .event-tooltip .mapboxgl-popup-content {
            padding: 0.625rem 0.75rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 16px rgb(0 0 0 / 18%);
            font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #333;
        }

        .event-tooltip .mapboxgl-popup-tip {
            border-top-color: #fff;
        }

        .event-tooltip__name {
            font-weight: 700;
            color: #c45;
            margin-bottom: 0.25rem;
        }

        .event-tooltip__event {
            margin-bottom: 0.375rem;
        }

        .event-tooltip__meta {
            font-size: 12px;
            color: #666;
        }

        #footer { background-color: #ddd; }
        #footer p { font-size: 12px; color: #666; line-height:16px; padding: 10px 20px; text-indent: 1em; margin-bottom: 0 }

        @media only screen and (max-width: 640px) {

            #layout {
                flex-direction: column;
            }

            #event-panel {
                width: 100%;
                height: 38vh;
                border-left: none;
                border-bottom: 1px solid #ddd;
            }

            #sidebar {
                width: 100%; margin:0; left:0; top:0; height:200px; overflow-y:hidden; border-width:0;
                display: flex; flex-direction: row;
            }
            #slideshow { display: flex; flex-direction: row; }
            .slide { flex-basis: auto; flex-shrink:0; }
            .slide .heading { height:200px; width:100vw; padding-top:30px; }

            #footer { padding:0; margin:0;}
            #footer p { width:100vw; font-size: 14px; padding:20px;}

            .event { max-width: 140px }

        }
        @media only screen and (max-width: 350px) {
            #intro p { font-size: 14px }
            #intro h2 { font-size: 14px; font-weight: 600; padding: 0 1em; line-height: 20px }
        }


    </style>
</head>

<body>
    <div id="layout">
        <div id="map"></div>
        <aside id="event-panel">
            <div id="event-panel__toolbar">
                <h2 id="event-panel__header">事件</h2>
                <div id="event-panel__controls">
                    <button type="button" id="event-play-btn">Play</button>
                    <button type="button" id="event-reset-btn">Reset</button>
                </div>
            </div>
            <div id="event-list"></div>
        </aside>
    </div>
</body>
<script src='./mapbox-config.js'></script>
<script src='./jsonQ.min.js'></script>
<script src='./index.js'></script>

</html>
